<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favicon 預覽工具</title>
  <meta name="description" content="上傳圖片，立即預覽它當作網站 favicon 在瀏覽器分頁上的樣子。純前端處理，圖片不會上傳。">
  <link id="favLink" rel="icon" href="assets/favicon.ico" sizes="any">
  <!-- 社群分享卡（Open Graph / Twitter）-->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Favicon 預覽工具">
  <meta property="og:description" content="上傳圖片，立即預覽它當作網站 favicon 在瀏覽器分頁上的樣子。純前端處理，圖片不會上傳。">
  <meta property="og:image" content="https://takochang0604.github.io/favicon-preview-tool/assets/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:url" content="https://takochang0604.github.io/favicon-preview-tool/">
  <meta name="twitter:card" content="summary_large_image">
  <script>
    // 提早套用主題，避免重整閃爍
    (function(){
      try{
        var t = localStorage.getItem("favtool-theme");
        if(!t) t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", t);
      }catch(e){ document.documentElement.setAttribute("data-theme","light"); }
    })();
  </script>
  <style>
    :root{
      --bg:#f4f6fb; --card:#fff; --ink:#1a2233; --sub:#6b7488; --line:#e4e8f0;
      --accent:#16386e; --accent-d:#0f2a54;
      --ok:#137a3f; --ok-bg:#e8f6ee; --ok-bd:#bfe6cd;
      --warn:#7a5c00; --warn-bg:#fff8e6; --warn-bd:#f0e0a8;
      --err:#a8202a; --err-bg:#fdeaec; --err-bd:#f3c2c7;
      --drop-line:#b9c3d6; --toggle-bg:rgba(255,255,255,.7); --shadow:rgba(0,0,0,.08);
    }
    [data-theme="dark"]{
      --bg:#13171e; --card:#1d232d; --ink:#e7eaf0; --sub:#9aa4b4; --line:#2b333f;
      --accent:#3f80d8; --accent-d:#356fc0;
      --ok:#7fd6a2; --ok-bg:#15301f; --ok-bd:#2c5a3c;
      --warn:#e8cf86; --warn-bg:#332b12; --warn-bd:#5c5024;
      --err:#f0a4ab; --err-bg:#3a1c1f; --err-bd:#6b2e34;
      --drop-line:#3a4456; --toggle-bg:rgba(40,46,56,.7); --shadow:rgba(0,0,0,.4);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Segoe UI","Microsoft JhengHei",system-ui,sans-serif;background:var(--bg);
      color:var(--ink);line-height:1.6;padding:56px 20px 80px;transition:background .2s,color .2s}
    .wrap{max-width:980px;margin:0 auto}
    header{text-align:center;margin-bottom:6px}
    h1{font-size:25px;letter-spacing:.5px}
    .lead{color:var(--sub);text-align:center;font-size:14.5px;margin-bottom:28px}
    h2{font-size:17px;margin:34px 0 14px;padding-bottom:8px;border-bottom:2px solid var(--line)}

    #theme{position:fixed;top:10px;right:16px;z-index:1000;border:1px solid var(--line);
      background:var(--toggle-bg);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
      color:var(--ink);border-radius:20px;padding:7px 14px;font-size:13px;cursor:pointer}
    #theme:hover{border-color:var(--accent)}
    @media(max-width:640px){ #theme{top:6px;right:10px;padding:5px 10px;font-size:12px} }

    .drop{background:var(--card);border:2px dashed var(--drop-line);border-radius:16px;padding:34px 20px;
      text-align:center;transition:.15s;cursor:pointer}
    .drop:hover{border-color:var(--accent)}
    .drop.over{border-color:var(--accent);transform:scale(1.005)}
    .drop .ico{font-size:34px}
    .drop .t{font-weight:600;margin-top:6px}
    .drop .s{color:var(--sub);font-size:13px;margin-top:4px}
    .btns{display:flex;gap:12px;justify-content:center;margin-top:16px;flex-wrap:wrap}
    button{font:inherit;border-radius:10px;padding:10px 20px;cursor:pointer;border:1px solid transparent}
    .primary{background:var(--accent);color:#fff}
    .primary:hover{background:var(--accent-d)}
    .ghost{background:var(--card);border:1px solid var(--line);color:var(--ink)}
    .ghost:hover{border-color:var(--accent)}
    .ghost:disabled{opacity:.45;cursor:not-allowed}

    #msg{margin:16px 0 0;border-radius:10px;padding:12px 16px;font-size:14px;display:none}
    #msg.show{display:block}
    #msg.ok{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-bd)}
    #msg.warn{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-bd)}
    #msg.err{background:var(--err-bg);color:var(--err);border:1px solid var(--err-bd)}
    #msg ul{margin:6px 0 0 18px}

    #preview[hidden]{display:none}
    .meta{color:var(--sub);font-size:13px;margin:6px 0 18px}
    .meta b{color:var(--ink)}
    .tabs{display:grid;gap:18px;grid-template-columns:1fr 1fr}
    @media(max-width:640px){.tabs{grid-template-columns:1fr}}
    .tabbox{border-radius:12px;padding:16px;border:1px solid var(--line)}
    .tabbox.light{background:#e9ecf3}
    .tabbox.dark{background:#20242c}
    .tabbox h3{font-size:13px;margin-bottom:12px}
    .tabbox.light h3{color:#444}.tabbox.dark h3{color:#cfd4dd}
    .tab{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:9px 9px 0 0;width:230px;font-size:13px}
    .tabbox.light .tab{background:#fff;color:#333}.tabbox.dark .tab{background:#2d323c;color:#e6e9ef}
    .tab img{width:16px;height:16px;display:block;flex:0 0 auto}
    .tab span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .row{display:flex;gap:24px;align-items:flex-end;margin-top:12px;flex-wrap:wrap}
    .px{text-align:center}
    .px img{display:block}
    .px span{display:block;font-size:11px;margin-top:6px}
    .tabbox.light .px span{color:#667}.tabbox.dark .px span{color:#aab}
  </style>
</head>
<body>
<button id="theme" type="button"></button>
<div class="wrap">
  <header><h1>🔍 Favicon 預覽工具</h1></header>
  <p class="lead">上傳一張圖，立即看到它當作 favicon 在瀏覽器分頁上的樣子（圖片只在你的瀏覽器處理，不會上傳）。</p>

  <div class="drop" id="drop">
    <div class="ico">🖼️</div>
    <div class="t">把圖片拖到這裡，或點此選擇檔案</div>
    <div class="s">只接受 favicon 標準格式 .ico / .png / .svg，建議正方形、32–256px、3MB 以內</div>
    <div class="btns">
      <button class="primary" id="pick" type="button">選擇圖片</button>
      <button class="ghost" id="reset" type="button" disabled>還原預設</button>
    </div>
    <input type="file" id="file" accept="image/png,image/x-icon,image/vnd.microsoft.icon,image/svg+xml,.ico,.png,.svg" hidden>
  </div>
  <div id="msg"></div>

  <section id="preview" hidden>
    <h2>預覽效果</h2>
    <p class="meta" id="meta"></p>
    <div class="tabs">
      <div class="tabbox light"><h3>淺色分頁</h3>
        <div class="tab"><img class="pv" alt=""><span>網站分頁標題</span></div>
        <div class="row">
          <div class="px"><img class="pv" width="16" height="16"><span>16px</span></div>
          <div class="px"><img class="pv" width="32" height="32"><span>32px</span></div>
          <div class="px"><img class="pv" width="64" height="64"><span>64px</span></div>
        </div>
      </div>
      <div class="tabbox dark"><h3>深色分頁</h3>
        <div class="tab"><img class="pv" alt=""><span>網站分頁標題</span></div>
        <div class="row">
          <div class="px"><img class="pv" width="16" height="16"><span>16px</span></div>
          <div class="px"><img class="pv" width="32" height="32"><span>32px</span></div>
          <div class="px"><img class="pv" width="64" height="64"><span>64px</span></div>
        </div>
      </div>
    </div>
  </section>
</div>

<script>
(function(){
  var MAX_BYTES = 3 * 1024 * 1024;
  var OK_TYPES = ["image/png","image/x-icon","image/vnd.microsoft.icon","image/svg+xml"];
  var OK_EXT = ["png","ico","svg"];
  var DEFAULT_FAV = "assets/favicon.ico";

  var drop=document.getElementById("drop"), file=document.getElementById("file"),
      msg=document.getElementById("msg"), preview=document.getElementById("preview"),
      meta=document.getElementById("meta"), resetBtn=document.getElementById("reset"),
      pvs=document.querySelectorAll(".pv"), favLink=document.getElementById("favLink"),
      themeBtn=document.getElementById("theme");

  function paintThemeBtn(){
    var dark = document.documentElement.getAttribute("data-theme")==="dark";
    themeBtn.textContent = dark ? "☀️ 淺色模式" : "🌙 深色模式";
  }
  themeBtn.addEventListener("click", function(){
    var dark = document.documentElement.getAttribute("data-theme")==="dark";
    var next = dark ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", next);
    try{ localStorage.setItem("favtool-theme", next); }catch(e){}
    paintThemeBtn();
  });
  paintThemeBtn();

  function showMsg(type, html){ msg.className="show "+type; msg.innerHTML=html; }
  function clearMsg(){ msg.className=""; msg.innerHTML=""; }
  function ext(name){ return (name.split(".").pop()||"").toLowerCase(); }

  function validateFile(f){
    var e=ext(f.name);
    var typeOk = OK_TYPES.indexOf(f.type)!==-1 || OK_EXT.indexOf(e)!==-1;
    if(!typeOk) return "這不是 favicon 支援的格式。只接受 favicon 標準格式 .ico / .png / .svg。";
    if(f.size>MAX_BYTES) return "檔案太大（"+(f.size/1024/1024).toFixed(1)+"MB）。favicon 不需這麼大，請壓在 3MB 以內。";
    return null;
  }

  function applyImage(url, sourceLabel){
    var probe=new Image();
    probe.onload=function(){
      var w=probe.naturalWidth, h=probe.naturalHeight;
      pvs.forEach(function(img){ img.src=url; });
      favLink.href=url;
      preview.hidden=false; resetBtn.disabled=false;
      meta.innerHTML="來源：<b>"+sourceLabel+"</b>　原始尺寸：<b>"+(w||"?")+"×"+(h||"?")+"</b>";
      var warns=[];
      if(w&&h&&w!==h) warns.push("圖片不是正方形（"+w+"×"+h+"），分頁上會被壓扁或裁切，建議裁成 1:1。");
      if(w&&h&&Math.max(w,h)<32) warns.push("圖片偏小（最大邊 "+Math.max(w,h)+"px），放大到分頁會模糊，建議至少 32px。");
      if(w&&h&&Math.max(w,h)>1024) warns.push("圖片很大（"+Math.max(w,h)+"px），用作 favicon 偏重，可縮到 256px 以內。");
      if(warns.length) showMsg("warn","⚠️ 圖片可以用，但有幾點提醒：<ul><li>"+warns.join("</li><li>")+"</li></ul>");
      else showMsg("ok","✅ 圖片已套用，尺寸與格式都 OK。看上方分頁與各尺寸效果。");
    };
    probe.onerror=function(){ showMsg("err","無法讀取這張圖片，檔案可能損壞或格式不支援，請換一張。"); };
    probe.src=url;
  }

  function handleFile(f){
    clearMsg();
    if(!f) return;
    var err=validateFile(f);
    if(err){ showMsg("err","❌ "+err); return; }
    var reader=new FileReader();
    reader.onload=function(ev){ applyImage(ev.target.result, f.name); };
    reader.onerror=function(){ showMsg("err","讀取檔案失敗，請再試一次。"); };
    reader.readAsDataURL(f);
  }

  document.getElementById("pick").addEventListener("click", function(e){ e.stopPropagation(); file.click(); });
  drop.addEventListener("click", function(){ file.click(); });
  file.addEventListener("change", function(){ if(file.files&&file.files[0]) handleFile(file.files[0]); file.value=""; });

  ["dragenter","dragover"].forEach(function(ev){ drop.addEventListener(ev, function(e){ e.preventDefault(); drop.classList.add("over"); }); });
  ["dragleave","drop"].forEach(function(ev){ drop.addEventListener(ev, function(e){ e.preventDefault(); drop.classList.remove("over"); }); });
  drop.addEventListener("drop", function(e){
    var dt=e.dataTransfer;
    if(!dt||!dt.files||!dt.files.length){ showMsg("err","沒有偵測到檔案，請改用「選擇圖片」。"); return; }
    if(dt.files.length>1) showMsg("warn","一次只測一張，已取用第一張。");
    handleFile(dt.files[0]);
  });

  resetBtn.addEventListener("click", function(){
    favLink.href=DEFAULT_FAV; preview.hidden=true; resetBtn.disabled=true; clearMsg();
  });
})();
</script>
</body>
</html>
